services:
  ollama:
    volumes:
      - ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    networks:
      - internal
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}

  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
      - ./function_configs:/app/backend/open-webui/function_configs
    depends_on:
      - ollama
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
      - "8080:8080"
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - 'WEBUI_SECRET_KEY='
      - 'BYPASS_MODEL_ACCESS_CONTROL=True'
      - 'PDF_EXTRACT_IMAGES=True'
      - 'ENABLE_SIGNUP=True'
      - 'RAG_EMBEDDING_ENGINE=openai'
      - 'RAG_EMBEDDING_MODEL=bge-m3'
      - 'OPENAI_API_BASE_URLS=' # в проде убрать
      - 'OPENAI_API_KEYS=' # в проде убрать
      - 'ENV=dev' # в проде убрать
      # Включить веб-поиск
      - 'ENABLE_RAG_WEB_SEARCH=True'
      # Адрес SearXNG (важно: шаблон <query> обязателен!)
      - 'SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>' 
      # Количество результатов
      - 'RAG_WEB_SEARCH_RESULT_COUNT=5'
      # Язык поиска
      - 'SEARXNG_LANGUAGE=all'
      # Ограничение одновременных запросов (рекомендуется)
      - 'RAG_WEB_SEARCH_CONCURRENT_REQUESTS=1'
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama: {}
  open-webui: {}
