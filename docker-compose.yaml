services:
  ollama:
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    networks:
      - internal

  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    container_name: open-webui
    env_file:
      - .env
    depends_on:
      - ollama
      - pipelines
      - chromadb
      - searxng
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
      - "8080:8080"
    volumes:
      - open-webui:/app/backend/data
      - ./function_configs:/app/function_configs
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=
      - BYPASS_MODEL_ACCESS_CONTROL=True
      - PDF_EXTRACT_IMAGES=True
      - ENABLE_SIGNUP=True
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_EMBEDDING_MODEL=bge-m3
      - RAG_OPENAI_API_BASE_URL=${MWS_API_BASE}
      - RAG_OPENAI_API_KEY=${MWS_API_TOKEN}
      - OPENAI_API_BASE_URLS=${MWS_API_BASE};http://pipelines:9099
      - OPENAI_API_KEYS=${MWS_API_TOKEN};pipelines
      - VECTOR_DB=chroma
      - CHROMA_HTTP_HOST=chromadb
      - CHROMA_HTTP_PORT=8000
      - ENABLE_WEB_SEARCH=True
      - WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://open-webui-searxng:8080/search?q=<query>&format=json
      - WEB_SEARCH_RESULT_COUNT=5
      - SEARXNG_LANGUAGE=all
      - WEB_SEARCH_CONCURRENT_REQUESTS=1
      - DEFAULT_USER_ROLE=user
      - ENABLE_PERSISTENT_CONFIG=False
      - AUDIO_STT_ENGINE=openai
      - AUDIO_STT_MODEL=whisper-turbo-local
      - AUDIO_STT_OPENAI_API_BASE_URL=${MWS_API_BASE}
      - AUDIO_STT_OPENAI_API_KEY=${MWS_API_TOKEN}
      - RAG_ALLOWED_FILE_EXTENSIONS=pdf,txt,md,docx,ogg,mp3
      - WEB_SEARCH_TRUST_ENV=True
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    networks:
      - internal

  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: pipelines
    depends_on:
      - chromadb
    ports:
      - "9099:9099"
    environment:
      - PIPELINES_URLS=
      - RESET_PIPELINES_DIR=false
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - pipelines:/app/pipelines
    restart: unless-stopped
    networks:
      - internal

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb:/chroma/chroma
    restart: unless-stopped
    networks:
      - internal

  searxng-redis:
    image: valkey/valkey:8-alpine
    container_name: searxng-redis
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - searxng-redis:/data
    networks:
      - internal

  searxng:
    image: searxng/searxng:latest
    container_name: open-webui-searxng
    depends_on:
      - searxng-redis
    ports:
      - "8081:8080"
    volumes:
      - ./backend/searxng_data/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081/
      - UWSGI_WORKERS=4
      - UWSGI_THREADS=4
    restart: unless-stopped
    networks:
      internal:
        aliases:
          - open-webui-searxng
          - searxng_data-searxng

volumes:
  ollama: {}
  open-webui: {}
  pipelines: {}
  chromadb: {}
  searxng-redis: {}

networks:
  internal: {}
